name: Java CI with Maven

# 1. Kích hoạt khi có sự kiện push hoặc pull_request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 2. Lấy code từ kho chứa (checkout)
    - uses: actions/checkout@v3

    # 3. Thiết lập môi trường Java (Sử dụng Java 17 như bạn đã sửa ở Bài 1)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 4. Thực thi Maven build (bao gồm pha test và package)
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # 5. Lưu trữ file .jar (Artifact) sau khi build thành công
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: my-app-jar
        path: target/*.jar