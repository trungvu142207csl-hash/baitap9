name: Bài 7 - Automated Code Review

on:
  # Trigger khi có PR hướng vào nhánh main
  pull_request:
    branches: [ "main" ]

jobs:
  review:
    runs-on: ubuntu-latest
    # Cần quyền write để Bot có thể đăng comment vào PR
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle
        # Chạy checkstyle để tạo file xml kết quả
        run: mvn checkstyle:checkstyle -Dcheckstyle.includes=**/bai7/** --file bai7/pom.xml

      - name: Inline Feedback
        # Sử dụng action để tự động comment vào đúng dòng code lỗi
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkstyle_config: google_checks.xml # Sử dụng chuẩn Google[cite: 1]
          level: warning