name: Bài 5 - Code Coverage (JaCoCo)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  coverage-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Verify with JaCoCo
      # Lệnh verify sẽ kích hoạt cả 3 bước: test, report và check (80%) của JaCoCo
      run: mvn -B verify --file bai5/pom.xml

    - name: Upload JaCoCo HTML Report
      # Luôn chạy bước này kể cả khi build fail (để bạn xem phần nào chưa test)
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        # Đường dẫn mặc định của JaCoCo report
        path: bai5/target/site/jacoco/